<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>SIMPLE BASKETBALL</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Top bar: shows current context (team, date, phase) + nav toggle -->
    <header id="topbar" class="topbar hidden">
      <button id="navToggle" class="nav-toggle" aria-label="Menu">[MENU]</button>
      <div id="statusLine" class="status-line"></div>
    </header>

    <!-- Slide-in navigation drawer -->
    <nav id="navDrawer" class="nav-drawer hidden" aria-label="Main navigation"></nav>
    <div id="navScrim" class="nav-scrim hidden"></div>

    <!-- Main screen render target -->
    <main id="screen" class="screen"></main>

    <!-- Modal layer -->
    <div id="modal" class="modal hidden">
      <div id="modalBody" class="modal-body"></div>
    </div>

    <!-- Toast / notice area -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <!-- Hidden file input reused for all uploads (roster + save import) -->
  <input type="file" id="fileInput" accept=".json,application/json" class="visually-hidden" />

  <script type="module" src="js/main.js"></script>
</body>
</html>
